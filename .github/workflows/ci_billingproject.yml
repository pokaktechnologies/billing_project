name: Billing main backend 

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Billing Backend to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            # Go to backend directory
            cd /var/www/billing/billing_project
            # Set correct repository
            git remote set-url origin https://abinxnazer:${{ secrets.GH_TOKEN }}@github.com/pokaktechnologies/billing_project.git
            echo " Fetching latest code..."
            git fetch origin main
            PREV_COMMIT=$(git rev-parse HEAD)
            git checkout main
            git pull origin main
            echo "Previous commit: $PREV_COMMIT"
            echo "Current commit: $(git rev-parse HEAD)"
            echo " Building backend image..."
            docker compose build backend || { docker compose logs backend; exit 1; }
            echo " Checking migrations..."
            docker compose run --rm backend python manage.py makemigrations --check --dry-run || exit 1
            echo " Validating Django project..."
            docker compose run --rm backend python manage.py check || exit 1
            echo " Running migrations..."
            docker compose run --rm backend python manage.py migrate --noinput || exit 1
            echo " Collecting static files..."
            docker compose run --rm backend python manage.py collectstatic --noinput || exit 1
            echo " Restarting backend container..."
            docker compose up -d backend
            sleep 5
            if ! docker compose ps | grep -q "backend.*Up"; then
              echo "❌ Backend container crashed"
              docker compose logs backend
              exit 1
            fi
            echo " Backend logs:"
            docker compose logs --tail=50 backend
            echo "✅ Deployment completed successfully"

  notify-success:
    name: Notify Success
    needs: deploy
    if: success()
    uses: ./.github/workflows/notify-telegram.yml
    with:
      status: success
      project: "Billing Project"
      environment: production
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  notify-failure:
    name: Notify Failure
    needs: deploy
    if: failure()
    uses: ./.github/workflows/notify-telegram.yml
    with:
      status: failure
      project: "Billing Project"
      environment: production
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
